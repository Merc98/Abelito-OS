<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABEL OS+ Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --text: #e0e0e6;
            --text-dim: #9494a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            -webkit-app-region: drag;
        }

        /* Glassmorphism Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(15, 15, 18, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        .nav-item:hover {
            background: var(--surface);
            color: #fff;
        }

        .nav-item.active {
            background: var(--surface);
            color: var(--accent);
            border: 1px solid var(--border);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 0%, rgba(124, 77, 255, 0.05), transparent);
            position: relative;
        }

        .header {
            height: 80px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
            margin-right: 8px;
        }

        .content-area {
            flex: 1;
            padding: 0 40px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            -webkit-app-region: no-drag;
        }

        /* Message Bubbles */
        .message {
            max-width: 80%;
            padding: 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 15px;
            animation: fadeIn 0.3s ease-out;
        }

        .message.bot {
            background: var(--surface);
            border: 1px solid var(--border);
            align-self: flex-start;
        }

        .message.user {
            background: var(--accent);
            color: #fff;
            align-self: flex-end;
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        /* Command Input */
        .input-container {
            padding: 20px 40px 40px;
            -webkit-app-region: no-drag;
        }

        .input-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            padding: 12px 0;
            outline: none;
        }

        .btn-send {
            background: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">ABEL OS+</div>
        <div class="nav-item active">
            <span>🏠</span> Dashboard
        </div>
        <div class="nav-item">
            <span>🌐</span> Navigator
        </div>
        <div class="nav-item">
            <span>💻</span> Computer Use
        </div>
        <div class="nav-item">
            <span>🧠</span> Memory Core
        </div>
        <div style="margin-top: auto;">
            <div class="nav-item">
                <span>⚙️</span> Settings
            </div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div class="status-dot"></div>
            <span style="font-size: 12px; color: var(--text-dim);">SYSTEM ONLINE</span>
        </div>

        <div class="content-area" id="chat">
            <div class="message bot">
                Hello. I am <strong>ABEL</strong>. All systems operational. How can I assist you in controlling your digital environment today?
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <span>⚡</span>
                <input type="text" id="userInput" placeholder="Ask anything or execute a skill..." autofocus>
                <button class="btn-send" onclick="sendMessage()">EXECUTE</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            try {
                // Determine if it's a command for a skill or a general query
                // For this demo, we'll try 'web_search' as default for complex queries
                const response = await window.abelAPI.invokeSkill('web_search', 'search', { query: text });
                
                if (response.error) {
                    addMessage(`Error: ${response.error}`, 'bot');
                } else {
                    addMessage(response.summary || JSON.stringify(response), 'bot');
                }
            } catch (err) {
                addMessage(`Communication failure with CEO API. Make sure it's running.`, 'bot');
            }
        }

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `message ${side}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        input.onkeydown = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
    </script>
</body>
</html>
