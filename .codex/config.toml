[mcp.servers.chisel]
command = "npx"
args = ["-y", "@ckanthony/mcp-chisel"]

[mcp.servers.srclight]
command = "npx"
args = ["-y", "srclight"]

[mcp.servers.lsp]
command = "npx"
args = ["-y", "@isaacphi/mcp-language-server"]

[mcp.servers.context7]
command = "npx"
args = ["-y", "@upstash/mcp-server-context7"]

[mcp.servers.playwright]
command = "npx"
args = ["-y", "@microsoft/playwright-mcp"]
env = { PLAYWRIGHT_BROWSER_ISOLATION = "true" }

[mcp.servers.brave]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]

[mcp.servers.docker]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-docker"]

[mcp.servers.android_jadx]
command = "npx"
args = ["-y", "@zinja-coder/jadx-mcp-server"]

[mcp.servers.android_apktool]
command = "npx"
args = ["-y", "@secfathy/apktool-mcp"]

[mcp.servers.recallnest]
command = "python"
args = ["-m", "recallnest.server"]
env = { RECALLNEST_STORAGE = "./data/memory/recallnest" }
